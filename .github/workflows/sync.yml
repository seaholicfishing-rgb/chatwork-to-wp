name: chatwork-to-wp

on:
  schedule:
    # JST 7:00〜23:59 の間、15分ごとに実行（UTCに換算: 22-23時台 + 0-14時台）。
    # GitHub Actionsのscheduleは数分の遅延がよくあるので、投稿は最大15分ほどで反映されます。
    - cron: '4,19,34,49 0-14,22,23 * * *'
  workflow_dispatch:        # 「今すぐ反映したい」時に手動実行できる

permissions:
  contents: write           # state.json をリポジトリに書き戻すため

concurrency:
  group: cw-to-wp
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run sync
        env:
          CHATWORK_TOKEN: ${{ secrets.CHATWORK_TOKEN }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
        run: python sync.py

      - name: Commit state
        run: |
          if [ -n "$(git status --porcelain state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "update state [skip ci]"
            git push
          else
            echo "state に変更なし"
          fi
